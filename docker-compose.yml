services:
  api:
    build: ./backend
    container_name: mega-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://mega:mega@db:5432/mega
      REDIS_URL: redis://redis:6379
      LLM_API_KEY: ${ANTHROPIC_API_KEY:-stub-not-used-in-slice-0}
      LLM_MODEL: ${LLM_MODEL:-claude-haiku-4-5-20251001}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      MEGA_RO_PASSWORD: ${MEGA_RO_PASSWORD:-mega_ro}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: ./backend
    container_name: mega-worker
    command: ["arq", "app.worker.WorkerSettings"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://mega:mega@db:5432/mega
      REDIS_URL: redis://redis:6379
      LLM_API_KEY: ${ANTHROPIC_API_KEY:-stub-not-used-in-slice-0}
      LLM_MODEL: ${LLM_MODEL:-claude-haiku-4-5-20251001}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      MEGA_RO_PASSWORD: ${MEGA_RO_PASSWORD:-mega_ro}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    container_name: mega-db
    environment:
      POSTGRES_USER: mega
      POSTGRES_PASSWORD: mega
      POSTGRES_DB: mega
    volumes:
      - mega_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mega -d mega"]
      interval: 2s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: mega-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  mega_pgdata:
